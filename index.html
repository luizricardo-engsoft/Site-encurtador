<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@seu.usuario — links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080808;
    --surface: #111111;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0f0f0;
    --muted: #666;
    --accent: #e8e8e8;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.25rem 4rem;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* avatar */
  .avatar {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    border: 1px solid var(--border-hover);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.25rem;
    overflow: hidden;
    animation: fadeUp 0.6s ease both;
  }

  .avatar svg { width: 36px; height: 36px; opacity: 0.5; }

  .name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: -0.02em;
    color: var(--accent);
    animation: fadeUp 0.6s 0.05s ease both;
    margin-bottom: 0.3rem;
  }

  .bio {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    animation: fadeUp 0.6s 0.1s ease both;
    margin-bottom: 2.5rem;
    text-align: center;
  }

  /* section label */
  .section-label {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #333;
    margin-bottom: 0.75rem;
    align-self: flex-start;
    padding-left: 2px;
  }

  /* link button */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
    margin-bottom: 2.25rem;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    width: 100%;
    padding: 0.85rem 1.1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .link-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }

  .link-btn:hover {
    border-color: var(--border-hover);
    background: #161616;
    transform: translateY(-1px);
  }

  .link-btn:active { transform: translateY(0px) scale(0.99); }

  .link-btn .icon {
    width: 32px;
    height: 32px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .link-btn .icon svg { width: 16px; height: 16px; }

  .link-btn .label { flex: 1; }

  .link-btn .arrow {
    font-size: 0.75rem;
    color: #333;
    transition: color 0.2s, transform 0.2s;
  }

  .link-btn:hover .arrow { color: #666; transform: translateX(2px); }

  /* icon bg colors */
  .ic-insta { background: #1a0f13; }
  .ic-github { background: #0f0f12; }
  .ic-discord { background: #0d0f1a; }
  .ic-email { background: #0d130f; }
  .ic-pinterest { background: #1a0a0a; }
  .ic-youtube { background: #1a0c0c; }
  .ic-spotify { background: #091309; }

  /* icon accent colors */
  .ic-insta svg { color: #c45b8a; }
  .ic-github svg { color: #aaa; }
  .ic-discord svg { color: #7289da; }
  .ic-email svg { color: #4a9f6f; }
  .ic-pinterest svg { color: #e60023; }
  .ic-youtube svg { color: #ff4444; }
  .ic-spotify svg { color: #1db954; }

  /* staggered animation */
  .link-btn { animation: fadeUp 0.5s ease both; }
  .link-btn:nth-child(1) { animation-delay: 0.15s; }
  .link-btn:nth-child(2) { animation-delay: 0.20s; }
  .link-btn:nth-child(3) { animation-delay: 0.25s; }
  .link-btn:nth-child(4) { animation-delay: 0.30s; }
  .link-btn:nth-child(5) { animation-delay: 0.35s; }
  .link-btn:nth-child(6) { animation-delay: 0.40s; }
  .link-btn:nth-child(7) { animation-delay: 0.45s; }

  .footer {
    font-size: 0.62rem;
    color: #2a2a2a;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 0.5rem;
    animation: fadeUp 0.5s 0.55s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    html, body { padding: 2rem 1rem 3rem; }
  }
</style>
</head>
